<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide and show</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: black;

        }
    </style>
</head>
<body>
    <button>Hide element</button>
    <button class="show">show element</button>
    <div class="box"></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("button").on("click",function(){
                $(".box").hide(".box");
                console.log("box disappered")
            })
            $(".show").on("click",function(){
                $(".box").show(".box");
                console.log("box appered")
            })
        })
    </script>
</body>
</html>
