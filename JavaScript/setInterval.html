<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setIntervals</title>
</head>

<body>
    <script>
        let time = 0;
        const interval = setInterval(function () {
            console.log("hey there..");
            time++;
            if (time === 3) {
                    clearInterval(interval);
                    console.log("done");
                }
            
        }, 2000)
    </script>
</body>

</html>
