<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arrowFunction</title>
</head>
<body>
    <script>
        // normal way ::::::::>
        const home= function(){
            console.log("i am home");
        }
        home();

        // arrow function::::::>
        const home2 = () =>{
            console.log("i am in home now")
        }
        home2();
    </script>
</body>
</html>
