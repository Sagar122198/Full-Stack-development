<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>append_prepend</title>
</head>
<body>
    <h1>
        somthing in here;
    </h1>
    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("h1").append("hi").append("<i>this is italic</i>")
                    .prepend("helloooo")
        });
    </script>
</body>
</html>
